<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Realtime Chat App</title>
  <link rel="stylesheet" href="./styles.css?v=20260517-10">
</head>

<body>

  <div class="app-container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <header class="sidebar-header">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2a7.2 7.2 0 0 1-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 0 1-6 3.22z" />
        </svg>
        <span>Realtime Chat</span>
      </header>

      <div class="room-list-container" id="roomList">
        <!-- Room items will be injected here -->
      </div>
      <div class="room-list-empty" id="emptySidebar">
        No rooms yet.<br>Press the <strong>+</strong> button to join a room.
      </div>

      <button class="fab" id="fab">
        <svg viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
      </button>
    </aside>

    <!-- Main Chat Area -->
    <main class="main-area">
      <!-- Empty State -->
      <div class="main-empty" id="mainEmpty">
        <svg viewBox="0 0 24 24" width="120" height="120">
          <path
            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
        </svg>
        <h1>Realtime Chat App</h1>
        <p>Send and receive messages without keeping your phone online.<br>Use the + button on the left to join a chat
          room.</p>
      </div>

      <!-- Active Chat -->
      <div class="chat-area" id="chatArea">
        <header class="chat-header">
          <button class="back-btn" id="backBtn">
            <svg viewBox="0 0 24 24">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
          </button>
          <div class="room-avatar" id="chatHeaderAvatar" style="background: #00a884; width: 40px; height: 40px;">#</div>
          <div class="chat-header-info">
            <span class="chat-header-name" id="chatHeaderName">Room Name</span>
            <span class="chat-header-online" id="chatHeaderOnline">0 online</span>
          </div>
        </header>

        <section class="chat-body" id="chatBody">
          <div id="messagesContainer"></div>
          <div class="typing-container" id="typingContainer">
            <span class="typing-text" id="typingText">Someone is typing</span>
            <div class="typing-dots">
              <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
            </div>
          </div>
        </section>

        <footer class="input-bar-container">
          <div class="attached-file-preview" id="attachedFilePreview">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="var(--text-secondary)">
              <path
                d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
            </svg>
            <span class="attached-filename" id="attachedFilename">document.pdf</span>
            <button class="remove-file-btn" id="removeFileBtn">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path
                  d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
              </svg>
            </button>
          </div>

          <div class="input-bar">
            <button class="icon-btn" id="attachBtn" title="Attach file">
              <svg viewBox="0 0 24 24">
                <path
                  d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5a2.5 2.5 0 0 0 5 0V5c0-1.38-1.12-2.5-2.5-2.5S8 3.62 8 5v11.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z" />
              </svg>
            </button>
            <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.txt" style="display:none;" />

            <div class="input-container">
              <textarea id="messageInput" class="message-input" rows="1"
                placeholder="Type a message (use @AI for assistant)"></textarea>
            </div>

            <button class="send-btn" id="sendBtn">
              <svg viewBox="0 0 24 24">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
        </footer>
      </div>
    </main>
  </div>

  <!-- Join Room Modal -->
  <div class="modal-overlay" id="joinModal">
    <div class="modal-content">
      <h2 class="modal-title">Join Room</h2>
      <form id="joinForm">
        <div class="form-group">
          <input type="text" id="roomInput" class="form-input" placeholder="Enter room ID (e.g. general)" required
            autocomplete="off" />
        </div>
        <div class="form-group">
          <input type="text" id="nameInput" class="form-input" placeholder="Your display name" required
            autocomplete="off" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="btnCancel">Cancel</button>
          <button type="submit" class="btn-primary">Join Room</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./app.js?v=20260517-10"></script>
</body>

</html>
